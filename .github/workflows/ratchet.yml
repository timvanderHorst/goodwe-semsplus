name: Ratchet

on:
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  pin-actions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pin workflow action versions
        uses: sethvargo/ratchet@v0.11.4
        with:
          files: |
            .github/workflows/*.yml

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: chore/ratchet-pin-actions
          title: "chore(ci): ratchet pin action versions"
          commit-message: "chore(ci): ratchet pin action versions"
          body: |
            Automated workflow pinning updates generated by Ratchet.
          labels: |
            dependencies
            ci